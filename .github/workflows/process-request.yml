# Triggered when an issue is labeled 'symbol-request'.
# Parses the structured issue form, validates inputs, adds the entry to the
# appropriate distro manifest, and triggers the build workflow.

name: Process Symbol Request

on:
  issues:
    types: [labeled]

permissions: {}

jobs:
  process:
    if: github.event.label.name == 'symbol-request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Parse issue form
        id: parse
        uses: stefanbuck/github-issue-parser@10dcc54158ba4c137713d9d69d70a2da63b6bda3 # v3.2.3
        with:
          template-path: .github/ISSUE_TEMPLATE/symbol-request.yml

      - name: Validate and add to manifest
        id: manifest
        env:
          DISTRO: ${{ steps.parse.outputs.issueparser_distro }}
          VERSION: ${{ steps.parse.outputs.issueparser_version }}
          KERNEL: ${{ steps.parse.outputs.issueparser_kernel }}
          DEBUG_URL: ${{ steps.parse.outputs.issueparser_debug_url }}
        run: |
          echo "kernel=$KERNEL" >> "$GITHUB_OUTPUT"

          DISTRO_FILE="symbols/${DISTRO}.yaml"
          if [ ! -f "$DISTRO_FILE" ]; then
            echo "[-] Unknown distro: $DISTRO"
            echo "error=Unknown distro: $DISTRO" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Check for duplicates (kernel = uname -r is the unique key)
          if grep -q "kernel: \"$KERNEL\"" "$DISTRO_FILE"; then
            echo "[-] Symbol for $KERNEL already exists"
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Add entry to manifest
          python3 -c "
          import yaml, os
          f = 'symbols/' + os.environ['DISTRO'] + '.yaml'
          with open(f) as fh:
              data = yaml.safe_load(fh)
          if data.get('symbols') is None:
              data['symbols'] = []
          entry = {
              'kernel': os.environ['KERNEL'],
              'version': os.environ['VERSION'],
              'status': 'pending',
          }
          debug_url = os.environ.get('DEBUG_URL', '')
          if debug_url:
              entry['debug_url'] = debug_url
          data['symbols'].append(entry)
          with open(f, 'w') as fh:
              yaml.dump(data, fh, default_flow_style=False, sort_keys=False)
          "
          echo "added=true" >> "$GITHUB_OUTPUT"

      - name: Create PR for symbol request
        if: steps.manifest.outputs.added == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          KERNEL: ${{ steps.parse.outputs.issueparser_kernel }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="symbol-request/${KERNEL}"
          git config user.name "kernel-isf-bot[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add symbols/
          git commit -m "Add symbol request ${KERNEL} from #${ISSUE_NUMBER}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Add ISF symbols for ${KERNEL}" \
            --body "Closes #${ISSUE_NUMBER}" \
            --base main

      - name: Comment on issue (added)
        if: steps.manifest.outputs.added == 'true'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            **Symbol request accepted!**

            - Kernel: `${{ steps.manifest.outputs.kernel }}`
            - Status: `pending` — build will start shortly

            Once built, pull the images with:
            ```
            # Minimal OCI image (ISF JSON only)
            docker pull ghcr.io/genesary/kernel-isf-oci:${{ steps.manifest.outputs.kernel }}

            # Busybox image (for Kubernetes init containers)
            docker pull ghcr.io/genesary/kernel-isf-oci:${{ steps.manifest.outputs.kernel }}-busybox
            ```

      - name: Comment on issue (duplicate)
        if: steps.manifest.outputs.duplicate == 'true'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            **This symbol already exists!**

            Kernel `${{ steps.manifest.outputs.kernel }}` is already in the manifest.

            Pull the images with:
            ```
            docker pull ghcr.io/genesary/kernel-isf-oci:${{ steps.manifest.outputs.kernel }}
            docker pull ghcr.io/genesary/kernel-isf-oci:${{ steps.manifest.outputs.kernel }}-busybox
            ```

      - name: Comment on issue (error)
        if: steps.manifest.outputs.error != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            **Error processing request:** ${{ steps.manifest.outputs.error }}

            Please check your inputs and try again.
