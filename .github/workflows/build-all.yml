# Triggered on push to main when symbols/ files change.
# Finds all entries with status: pending and dispatches a build for each.

name: Build All Pending Symbols

on:
  push:
    branches: [main]
    paths:
      - "symbols/*.yaml"
  workflow_dispatch:

permissions: {}

jobs:
  find-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Find pending symbols and trigger builds
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          pip install pyyaml -q

          python3 -c "
          import yaml, json, subprocess, sys

          pending = []
          for f in sorted(__import__('pathlib').Path('symbols').glob('*.yaml')):
              with open(f) as fh:
                  data = yaml.safe_load(fh)
              distro = data.get('distro', '')
              for s in data.get('symbols', []) or []:
                  if s.get('status') == 'pending' and s.get('debug_url'):
                      pending.append({
                          'kernel': s['kernel'],
                          'distro': distro,
                          'distro_version': str(s.get('version', '')),
                          'debug_url': s['debug_url'],
                      })

          print(f'Found {len(pending)} pending symbol(s)')
          for p in pending:
              print(f'  Triggering: {p[\"kernel\"]}')
              subprocess.run([
                  'gh', 'workflow', 'run', 'build-isf.yml',
                  '-f', f'kernel={p[\"kernel\"]}',
                  '-f', f'distro={p[\"distro\"]}',
                  '-f', f'debug_url={p[\"debug_url\"]}',
                  '-f', f'distro_version={p[\"distro_version\"]}',
              ], check=True)
          "
