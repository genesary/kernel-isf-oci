# Build and publish the forensic toolbox image with SLSA provenance + cosign.
#
# Contains: Volatility3, dwarf2json, vol-qemu, qemu_elf.py, mquire
# Published as: ghcr.io/genesary/kernel-isf-toolbox:latest

name: Build Toolbox

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.tools"
      - "scripts/**"
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io
  TOOLBOX_IMAGE: ghcr.io/genesary/kernel-isf-toolbox:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Build and push toolbox
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.tools
          push: true
          tags: ${{ env.TOOLBOX_IMAGE }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image
        run: cosign sign --yes "${{ env.TOOLBOX_IMAGE }}"
