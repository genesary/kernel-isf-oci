# Build and publish the forensic toolbox image.
#
# Contains: Volatility3, dwarf2json, vol-qemu, qemu_elf.py, mquire
# Published as: ghcr.io/genesary/kernel-isf-oci:toolbox
#
# Triggers on changes to Dockerfile.tools or scripts/, or manually.

name: Build Toolbox

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.tools"
      - "scripts/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: genesary/kernel-isf-oci

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: x-access-token
          password: ${{ steps.app-token.outputs.token }}

      - name: Build and push toolbox
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:toolbox
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:toolbox-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
