# Build ISF symbols and push as OCI images with SLSA provenance + cosign signing.
#
#   ghcr.io/genesary/kernel-isf-oci:<uname -r>          — scratch (ISF JSON only)
#   ghcr.io/genesary/kernel-isf-oci:<uname -r>-busybox  — busybox (ISF + tools + entrypoint)

name: Build ISF

on:
  workflow_dispatch:
    inputs:
      kernel:
        description: "Kernel version (uname -r) — used as image tag"
        required: true
        type: string
      distro:
        description: "Linux distribution"
        required: true
        type: string
      debug_url:
        description: "Direct URL to the kernel debug package"
        required: true
        type: string
      distro_version:
        description: "Distribution version"
        required: true
        type: string

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: genesary/kernel-isf-oci

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check if image already exists
        id: check
        env:
          KERNEL: ${{ inputs.kernel }}
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${KERNEL}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "[*] Image $IMAGE already exists — skipping build"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: steps.check.outputs.exists != 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        if: steps.check.outputs.exists != 'true'
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      # ── Build ISF JSON via the builder Dockerfile ──
      - name: Build ISF (builder stage)
        if: steps.check.outputs.exists != 'true'
        env:
          DEBUG_URL: ${{ inputs.debug_url }}
          KERNEL: ${{ inputs.kernel }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.builder
          build-args: |
            DEBUG_PKG_URL=${{ inputs.debug_url }}
            SYMBOL_ID=${{ inputs.kernel }}
          target: generate
          load: true
          tags: isf-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Extract the ISF JSON from builder ──
      - name: Extract ISF JSON
        if: steps.check.outputs.exists != 'true'
        env:
          KERNEL: ${{ inputs.kernel }}
        run: |
          docker create --name extract isf-builder:latest
          mkdir -p /tmp/isf-output
          docker cp "extract:/output/${KERNEL}.json" /tmp/isf-output/isf.json
          docker rm extract
          ls -lh /tmp/isf-output/

      # ── Build and push scratch image (ISF only) ──
      - name: Build and push scratch image
        if: steps.check.outputs.exists != 'true'
        env:
          KERNEL: ${{ inputs.kernel }}
        run: |
          cat > /tmp/Dockerfile.scratch <<'DOCKERFILE'
          FROM scratch
          COPY isf.json /symbols/linux/isf.json
          DOCKERFILE
          docker buildx build \
            --platform linux/amd64 \
            --provenance=true \
            --sbom=true \
            -f /tmp/Dockerfile.scratch \
            -t "${REGISTRY}/${IMAGE_NAME}:${KERNEL}" \
            --push \
            /tmp/isf-output

      # ── Build and push busybox image ──
      - name: Build and push busybox image
        if: steps.check.outputs.exists != 'true'
        env:
          KERNEL: ${{ inputs.kernel }}
        run: |
          cat > /tmp/Dockerfile.busybox <<DOCKERFILE
          FROM busybox:stable
          COPY isf.json /symbols/linux/isf.json
          COPY vol-qemu /usr/local/bin/vol-qemu
          COPY qemu_elf.py /usr/local/bin/qemu_elf.py
          COPY entrypoint.sh /entrypoint.sh
          RUN chmod +x /entrypoint.sh /usr/local/bin/vol-qemu
          ENTRYPOINT ["/entrypoint.sh"]
          CMD ["/dest/symbols"]
          DOCKERFILE
          cp scripts/vol-qemu /tmp/isf-output/vol-qemu
          cp scripts/qemu_elf.py /tmp/isf-output/qemu_elf.py
          cp entrypoint.sh /tmp/isf-output/entrypoint.sh
          docker buildx build \
            --platform linux/amd64 \
            --provenance=true \
            --sbom=true \
            -f /tmp/Dockerfile.busybox \
            -t "${REGISTRY}/${IMAGE_NAME}:${KERNEL}-busybox" \
            --push \
            /tmp/isf-output

      # ── Sign images with cosign (keyless/Sigstore OIDC) ──
      - name: Sign images
        if: steps.check.outputs.exists != 'true'
        env:
          KERNEL: ${{ inputs.kernel }}
        run: |
          cosign sign --yes "${REGISTRY}/${IMAGE_NAME}:${KERNEL}"
          cosign sign --yes "${REGISTRY}/${IMAGE_NAME}:${KERNEL}-busybox"

      # ── Update manifest status ──
      - name: Update symbol status
        if: steps.check.outputs.exists != 'true'
        env:
          KERNEL: ${{ inputs.kernel }}
          DISTRO: ${{ inputs.distro }}
        run: |
          DISTRO_FILE="symbols/${DISTRO}.yaml"
          if [ -f "$DISTRO_FILE" ]; then
            python3 -c "
          import yaml, os
          f = os.environ['DISTRO_FILE']
          k = os.environ['KERNEL']
          with open(f) as fh:
              data = yaml.safe_load(fh)
          for s in data.get('symbols', []):
              if s.get('kernel') == k:
                  s['status'] = 'built'
          with open(f, 'w') as fh:
              yaml.dump(data, fh, default_flow_style=False, sort_keys=False)
          "
          fi

      - name: Commit status update
        if: steps.check.outputs.exists != 'true'
        env:
          KERNEL: ${{ inputs.kernel }}
        run: |
          git config user.name "kernel-isf-bot[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add symbols/
          git diff --cached --quiet || git commit -m "Mark ${KERNEL} as built"
          git push || true
