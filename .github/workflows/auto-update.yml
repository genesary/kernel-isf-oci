# Weekly check for new kernel releases on distros with scriptable APIs.
#
# Currently supports:
#   - Fedora (via Koji API)
#   - CentOS Stream (via kojihub API)
#   - Rocky Linux (via mirror directory listing)
#
# Runs every Monday at 06:00 UTC. Can also be triggered manually.
# Opens a PR for review instead of pushing directly to main.

name: Auto-Update Symbols

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  check-new-kernels:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Check for new kernels
        id: check
        run: |
          python3 scripts/auto-update.py
          if git diff --quiet symbols/; then
            echo "No new kernels found"
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "New kernels found!"
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="auto-update/$(date +%Y-%m-%d)"
          git config user.name "kernel-isf-bot[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add symbols/
          git commit -m "Auto-update: add new kernel releases"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Auto-update: new kernel releases $(date +%Y-%m-%d)" \
            --body "$(cat <<'EOF'
          ## Auto-detected new kernels

          This PR was automatically generated by the weekly kernel check.
          Review the new entries in `symbols/*.yaml` and merge to trigger builds.

          Generated by the Auto-Update workflow.
          EOF
          )" \
            --base main
